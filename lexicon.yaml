name: dpopsuev-lexicon
description: Daniel's personal rules, skills, and templates
version: "0.2.0"

defaults:
  priority: 25

routing:
  - match: { labels: [testing, tdd] }
    globs: ["**/*_test.*"]
  - match: { labels: [security, owasp] }
    always_apply: true
  - match: { labels: [process] }
    always_apply: true
  - match: { labels: [architecture] }
    always_apply: true
