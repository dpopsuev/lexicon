name: dpopsuev-lexicon
description: Daniel's personal rules, skills, templates, and MCP workflows
version: "0.3.0"

defaults:
  priority: 25

routing:
  - match: { labels: [testing, tdd] }
    globs: ["**/*_test.*"]
  - match: { labels: [security, owasp] }
    always_apply: true
  - match: { labels: [security, hygiene] }
    always_apply: true
  - match: { labels: [process] }
    always_apply: true
  - match: { labels: [process, agentic] }
    always_apply: true
  - match: { labels: [architecture] }
    always_apply: true
  - match: { labels: [conventions, output] }
    always_apply: true
  - match: { labels: [tools, mcp] }
    always_apply: true
